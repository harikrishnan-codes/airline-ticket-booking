<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airline Ticket Booking</title>
    <link rel="icon" href="./assets/bg remove.webp">

    <link rel="stylesheet" href="error.css">
    <link rel="stylesheet" href="./root.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>
<body>

    <main class="error-page">
  <div class="container error-container">
    
    <div class="error-visual">
      <div class="radar-circle"></div>
      <div class="radar-circle delay-1"></div>
      <div class="radar-circle delay-2"></div>
      <div class="airplane-icon">
        <i class="fas fa-plane"></i>
      </div>
      <h1 class="error-code">404</h1>
    </div>

    <div class="error-content">
      <h2>Lost in the Clouds?</h2>
      <p>The flight path you are looking for doesn't exist, has been rescheduled, or flew off our radar track completely.</p>
      
      <div class="error-actions">
        <a href="#" class="btn btn-secondary">
          <i class="fas fa-arrow-left"></i> Go Back
        </a>
        <a href="index.html" class="btn btn-primary">
          <i class="fas fa-home"></i> Return Home
        </a>
      </div>
    </div>

  </div>
</main>
    
</body>
</html>
